<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Pirkimo dokumentas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Dokumentai 3 / 5</div>
      <h2 class="question">Kokį pirkimo dokumentą turite?</h2>
      <p class="question-sub">Pirkimo įrodymas yra būtinas prašymui.</p>

      <div class="options">
        <button class="option-btn"
                data-value="purch_sutartis"
                data-next="q2-04-problem.html"
                data-upload-key="pirkimas"
                data-upload-label="Pridėti sutartį arba pirkimo patvirtinimą"
                data-upload-sub="PVM sąskaita faktūra, sąskaita, mokėjimo kortelės čekis, sutartis ir pan. (PDF arba nuotrauka)">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Sutartis arba užsakymo / pirkimo patvirtinimas</span>
            <span class="option-desc">PVM sąskaita faktūra, sąskaita, mokėjimo kortelės čekis ir pan.</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="purch_kvitas"
                data-next="q2-04-problem.html"
                data-upload-key="pirkimas"
                data-upload-label="Pridėti sąskaitos arba kvito kopiją"
                data-upload-sub="PDF arba nuotrauka">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Sąskaita faktūra arba kvitas</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="purch_bankas"
                data-next="q2-04-problem.html"
                data-upload-key="pirkimas"
                data-upload-label="Pridėti banko išrašą arba pavedimo kvitą"
                data-upload-sub="PDF arba screenshot iš banko programėlės">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Tik banko mokėjimo įrodymas</span>
            <span class="option-desc">Banko sąskaitos išrašas arba pavedimo kvitas</span>
          </span>
        </button>
        <button class="option-btn" data-value="purch_nieko" data-next="end-no-purchase.html">
          <span class="option-marker">D</span>
          <span class="option-body">
            <span class="option-title">Nieko neturiu</span>
          </span>
        </button>
      </div>

      <!-- Upload section — shown automatically when option with data-upload-key is selected -->
      <div id="uploadSection" hidden>
        <div class="upload-section">
          <label class="upload-label" id="uploadLabel">Pridėti dokumentus</label>
          <span class="upload-sublabel" id="uploadSublabel"></span>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx">
            <div class="upload-zone-icon">📎</div>
            <p><strong>Pasirinkite failus</strong> arba nutempkite čia</p>
            <span>PDF, nuotrauka, screenshot · maks. 20 MB vienas failas</span>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="q2-03-purchase.js"></script>
</body>
</html>

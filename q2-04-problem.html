<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Trūkumai ir problemos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Dokumentai 4 / 5</div>
      <h2 class="question">Kokie buvo pastebėti trūkumai ar problemos?</h2>
      <p class="question-sub">Pasirinkite situaciją — ji lems, kokius įrodymus rekomenduosime pridėti.</p>

      <div class="options">
        <button class="option-btn"
                data-value="prob_nekokybiska"
                data-next="q2-06-damages.html"
                data-upload-key="problema"
                data-upload-label="Pridėti trūkumo įrodymus"
                data-upload-sub="Nuotrauka, video, serviso išvada, garantinis aktas">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Prekė nekokybiška arba sugedo</span>
            <span class="option-desc">Rekomenduojama: nuotrauka / video, serviso išvada, garantinis aktas</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="prob_paslauga"
                data-next="q2-06-damages.html"
                data-upload-key="problema"
                data-upload-label="Pridėti paslaugos kokybės įrodymus"
                data-upload-sub="Sutartis, darbų aktai, nuotraukos prieš / po, susirašinėjimas">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Paslauga atlikta nekokybiškai</span>
            <span class="option-desc">Rekomenduojama: sutartis, darbų aktai, susirašinėjimas, nuotraukos</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="prob_pristatymas"
                data-next="q2-06-damages.html"
                data-upload-key="problema"
                data-upload-label="Pridėti pristatymo įrodymus"
                data-upload-sub="Užsakymo patvirtinimas, siuntos sekimo screenshot, susirašinėjimas">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Nepristatė arba vėluoja pristatymas</span>
            <span class="option-desc">Rekomenduojama: užsakymo patvirtinimas, siuntos sekimas, susirašinėjimas</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="prob_pinigai"
                data-next="q2-06-damages.html"
                data-upload-key="problema"
                data-upload-label="Pridėti įrodymus"
                data-upload-sub="Pretenzija, atsakymas, mokėjimo patvirtinimas, susirašinėjimas">
          <span class="option-marker">D</span>
          <span class="option-body">
            <span class="option-title">Negrąžina pinigų arba atsisako tenkinti pretenziją</span>
            <span class="option-desc">Rekomenduojama: pretenzija + atsakymas, mokėjimo įrodymas</span>
          </span>
        </button>
        <button class="option-btn"
                data-value="prob_kita"
                data-next="q2-06-damages.html"
                data-upload-key="problema"
                data-upload-label="Pridėti turimus įrodymus"
                data-upload-sub="Nuotraukos, susirašinėjimas, dokumentai">
          <span class="option-marker">E</span>
          <span class="option-body">
            <span class="option-title">Kita</span>
            <span class="option-desc">Pridėkite įrodymus, aiškiai parodančius aplinkybes</span>
          </span>
        </button>
      </div>

      <!-- Upload section — label and sublabel update based on selected option -->
      <div id="uploadSection" hidden>
        <div class="upload-section">
          <label class="upload-label" id="uploadLabel">Pridėti įrodymus</label>
          <span class="upload-sublabel" id="uploadSublabel"></span>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx">
            <div class="upload-zone-icon">📎</div>
            <p><strong>Pasirinkite failus</strong> arba nutempkite čia</p>
            <span>PDF, nuotrauka, video · maks. 20 MB vienas failas</span>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="q2-04-problem.js"></script>
</body>
</html>

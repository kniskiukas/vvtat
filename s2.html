<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Paslaugos teikėjas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Žingsnis 3 / 4</div>
      <h2 class="question">Identifikuokite paslaugos teikėją</h2>
      <p class="question-sub">Kur yra registruotas pardavėjas arba paslaugos teikėjas, su kuriuo turite ginčą?</p>

      <div class="options">
        <button class="option-btn" data-value="lt_verslas" data-next="s3-price.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Lietuvoje registruotas verslas</span>
            <span class="option-desc">Pardavėjas yra juridinis asmuo, veikiantis Lietuvoje</span>
          </span>
        </button>
        <button class="option-btn" data-value="eu_verslas" data-next="end-ecc.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">ES, Norvegijoje ar Islandijoje registruotas verslas</span>
            <span class="option-desc">Pardavėjas registruotas kitoje ES šalyje ar EEE valstybėje</span>
          </span>
        </button>
        <button class="option-btn" data-value="fiz_pardav" data-next="end-fiz-pardav.html">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Privatus asmuo (neprofesionalus pardavėjas)</span>
            <span class="option-desc">Pvz. pirkimas iš skelbimų portalo iš privataus asmens</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="s2.js"></script>
</body>
</html>

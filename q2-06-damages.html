<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Papildomi nuostoliai</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Dokumentai 5 / 5</div>
      <h2 class="question">Ar patyrėte papildomų nuostolių (žalą)?</h2>
      <p class="question-sub">Pvz. mokėjote už remontą, ekspertizę, papildomą siuntimą ar panašiai.</p>

      <div class="options">
        <button class="option-btn"
                data-value="dmg_taip"
                data-next="summary.html"
                data-upload-key="zala"
                data-upload-label="Pridėti žalos įrodymus"
                data-upload-sub="Sąskaitos, kvitai, ekspertizės aktas, pavedimų patvirtinimai">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Taip — patyriau papildomų nuostolių</span>
            <span class="option-desc">Pridėkite žalos įrodymus: sąskaitas, kvitus, pavedimų patvirtinimus</span>
          </span>
        </button>
        <button class="option-btn" data-value="dmg_ne" data-next="summary.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Ne — papildomų nuostolių nepatyriau</span>
          </span>
        </button>
        <button class="option-btn" data-value="dmg_nezinau" data-next="summary.html">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Nežinau — žalą galėsiu patikslinti vėliau</span>
            <span class="option-desc">Tęskite be šio dokumento, vėliau galėsite pridėti</span>
          </span>
        </button>
      </div>

      <!-- Upload section — shown only when option A is selected -->
      <div id="uploadSection" hidden>
        <div class="upload-section">
          <label class="upload-label" id="uploadLabel">Pridėti žalos įrodymus</label>
          <span class="upload-sublabel" id="uploadSublabel"></span>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx">
            <div class="upload-zone-icon">📎</div>
            <p><strong>Pasirinkite failus</strong> arba nutempkite čia</p>
            <span>PDF, nuotrauka, screenshot · maks. 20 MB vienas failas</span>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="q2-06-damages.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Pradžia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Žingsnis 1 / 4</div>
      <h2 class="question">Jūs esate?</h2>
      <p class="question-sub">VVTAT nagrinėja tik fizinių asmenų (vartotojų) skundus prieš verslą.</p>

      <div class="options">
        <button class="option-btn" data-value="fizinis" data-next="s1.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Fizinis asmuo</span>
            <span class="option-desc">Kreipiuosi kaip privatus vartotojas</span>
          </span>
        </button>
        <button class="option-btn" data-value="juridinis" data-next="end-juridinis.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Juridinis asmuo</span>
            <span class="option-desc">Atstovauju įmonę ar organizaciją</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="index.js"></script>
</body>
</html>

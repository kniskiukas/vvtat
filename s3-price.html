<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Kainos tikrinimas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Žingsnis 4 / 4</div>
      <h2 class="question">Ar jūsų įsigytos prekės ar paslaugos kaina viršija 20 eurų?</h2>
      <p class="question-sub">VVTAT nenagrinėja ginčų, kai ginčo suma yra mažesnė nei 20 eurų.</p>

      <div class="options">
        <button class="option-btn" data-value="kaina_taip" data-next="s4-category.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Taip, kaina viršija 20 eurų</span>
          </span>
        </button>
        <button class="option-btn" data-value="kaina_ne" data-next="end-kaina.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Ne, kaina neviršija 20 eurų</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="s3-price.js"></script>
</body>
</html>

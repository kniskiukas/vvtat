<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Ginčo pobūdis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Kategorija 1 / 2</div>
      <h2 class="question">Kokio pobūdžio yra jūsų ginčas?</h2>
      <p class="question-sub">Pasirinkite, kuri sritis geriausiai apibūdina problemą.</p>

      <div class="options">
        <button class="option-btn" data-value="laisvalaikis" data-next="s5-14days.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Laisvalaikio, turizmo arba transporto paslaugos</span>
          </span>
        </button>
        <button class="option-btn" data-value="preke" data-next="s5-14days.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Prekė nekokybiška, sugedo arba nepristatyta</span>
          </span>
        </button>
        <button class="option-btn" data-value="valymas" data-next="s5-14days.html">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Cheminio valymo ar valymo paslaugos</span>
          </span>
        </button>
        <button class="option-btn" data-value="statyba" data-next="s5-14days.html">
          <span class="option-marker">D</span>
          <span class="option-body">
            <span class="option-title">Statybos paslaugos</span>
          </span>
        </button>
        <button class="option-btn" data-value="grozis" data-next="s5-14days.html">
          <span class="option-marker">E</span>
          <span class="option-body">
            <span class="option-title">Grožio ar sveikatos priežiūros paslaugos</span>
          </span>
        </button>
        <button class="option-btn" data-value="reklama" data-next="s5-14days.html">
          <span class="option-marker">F</span>
          <span class="option-body">
            <span class="option-title">Reklamos paslaugos</span>
          </span>
        </button>
        <button class="option-btn" data-value="medicina" data-next="s5-14days.html">
          <span class="option-marker">G</span>
          <span class="option-body">
            <span class="option-title">Medicinos prekės</span>
          </span>
        </button>
        <button class="option-btn" data-value="kita" data-next="s5-14days.html">
          <span class="option-marker">H</span>
          <span class="option-body">
            <span class="option-title">Kita vartojimo paslauga ar prekė</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="s4-category.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – Ginčo kategorija</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Žingsnis 2 / 4</div>
      <h2 class="question">Jūs kreipiatės dėl?</h2>
      <p class="question-sub">Pasirinkite kategoriją, kuri geriausiai atspindi jūsų situaciją.</p>

      <div class="options">
        <button class="option-btn" data-value="rysiai" data-next="end-rrt.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Elektroninių ryšių arba pašto paslaugų</span>
            <span class="option-desc">Internetas, televizija, mobilusis ryšys, paštas</span>
          </span>
        </button>
        <button class="option-btn" data-value="finansai" data-next="end-lb.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Finansinių paslaugų</span>
            <span class="option-desc">Bankai, draudimas, kredito unijos, investicinės įmonės ir kt.</span>
          </span>
        </button>
        <button class="option-btn" data-value="vartojimas" data-next="s2.html">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Vartojimo prekių ar kitų paslaugų</span>
            <span class="option-desc">Laisvalaikis, turizmas, valymas, remontas, statyba, grožis, medicina ir kt.</span>
          </span>
        </button>
        <button class="option-btn" data-value="energetika" data-next="end-vert.html">
          <span class="option-marker">D</span>
          <span class="option-body">
            <span class="option-title">Energetikos įmonių veiklos ar komunalinių paslaugų</span>
            <span class="option-desc">Dujos, elektra, šiluma, vanduo</span>
          </span>
        </button>
        <button class="option-btn" data-value="teisines" data-next="end-advokatura.html">
          <span class="option-marker">E</span>
          <span class="option-body">
            <span class="option-title">Teisinių paslaugų (advokatų)</span>
            <span class="option-desc">Ginčai dėl advokato suteiktų paslaugų</span>
          </span>
        </button>
        <button class="option-btn" data-value="maistas" data-next="end-vmvt.html">
          <span class="option-marker">F</span>
          <span class="option-body">
            <span class="option-title">Maisto produktų ar veterinarinių paslaugų</span>
            <span class="option-desc">Maisto sauga, kokybė, veterinariniai pažeidimai</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="s1.js"></script>
</body>
</html>

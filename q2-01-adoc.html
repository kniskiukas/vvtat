<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VVTAT – ADoc formatas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header" id="appHeader"></header>
  <section class="hero" id="hero"></section>

  <main class="main-content">
    <div class="card">
      <div class="step-label">Dokumentai 1 / 5</div>
      <h2 class="question">Ar galėsite pateikti prašymą ADoc formatu?</h2>
      <p class="question-sub">Prašymai VVTAT teikiami elektroniniu parašu pasirašytu dokumentu (ADoc).</p>

      <div class="info-box blue">
        <span class="info-box-icon">📄</span>
        <div><strong>ADoc</strong> — elektroniniu parašu pasirašyto dokumento formatas. Pasirašoma per <em>Mobile ID</em>, <em>Smart-ID</em> arba USB raktą.</div>
      </div>

      <div class="options">
        <button class="option-btn" data-value="adoc_taip" data-next="q2-02-response.html">
          <span class="option-marker">A</span>
          <span class="option-body">
            <span class="option-title">Taip — turiu el. parašą ir galiu pasirašyti</span>
          </span>
        </button>
        <button class="option-btn" data-value="adoc_mob" data-next="q2-02-response.html">
          <span class="option-marker">B</span>
          <span class="option-body">
            <span class="option-title">Galiu, bet ADoc neatidarau telefone</span>
            <span class="option-desc">Rekomenduojame pildyti kompiuteryje</span>
          </span>
        </button>
        <button class="option-btn" data-value="adoc_nezinau" data-next="q2-01-explain.html">
          <span class="option-marker">C</span>
          <span class="option-body">
            <span class="option-title">Nežinau, kas yra ADoc</span>
            <span class="option-desc">Paaiškiname ir tęsiame</span>
          </span>
        </button>
        <button class="option-btn" data-value="adoc_ne" data-next="end-adoc-ne.html">
          <span class="option-marker">D</span>
          <span class="option-body">
            <span class="option-title">Ne — neturiu el. parašo arba nemoku</span>
          </span>
        </button>
      </div>

      <div class="actions" id="actions"></div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="q2-01-adoc.js"></script>
</body>
</html>
